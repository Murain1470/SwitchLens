<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>SwitchCapture</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#e8192c;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
}
html,body{width:100%;height:100%;background:#000;color:#f0f0f0;font-family:var(--font);overflow:hidden;user-select:none;-webkit-user-select:none}
#app{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}

/* VIDEO WRAPPER */
#vw{position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
@media (min-aspect-ratio:16/9){#vw{height:100vh;width:calc(100vh * 16/9)}}
@media (max-aspect-ratio:16/9){#vw{width:100vw;height:calc(100vw * 9/16)}}
#preview{width:100%;height:100%;object-fit:contain;display:block}

/* PLACEHOLDER */
#ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#0d0d0d;z-index:2;transition:opacity .3s}
#ph.hidden{opacity:0;pointer-events:none}
.logo{font-size:24px;font-weight:700;display:flex;align-items:center;gap:10px}
.dot{width:36px;height:36px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center}
.dot svg{width:18px;height:18px;fill:white}
#ph p{font-size:13px;color:rgba(255,255,255,.45);text-align:center;padding:0 24px}
#start-btn{padding:12px 36px;background:var(--red);border:none;border-radius:100px;color:#fff;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
#start-btn:active{opacity:.8}

/* FLASH */
#flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:20}
#flash.go{animation:fl .35s ease-out forwards}
@keyframes fl{0%{opacity:.95}100%{opacity:0}}

/* CONTROLS */
#ctrl{position:absolute;bottom:0;left:0;right:0;padding:12px 16px 16px;background:linear-gradient(to top,rgba(0,0,0,.8),transparent);display:flex;align-items:center;justify-content:space-between;gap:8px;z-index:10;transition:opacity .3s,transform .3s}
#ctrl.hide{opacity:0;transform:translateY(6px);pointer-events:none}
.cg{display:flex;align-items:center;gap:8px}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;font-family:var(--font);-webkit-tap-highlight-color:transparent;transition:transform .12s,opacity .12s}
.btn:active{transform:scale(.88);opacity:.7}
.ib{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.12);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff}
.ib svg{width:18px;height:18px}

#rec-btn{width:60px;height:60px;border-radius:50%;background:var(--red);box-shadow:0 0 0 3px rgba(232,25,44,.3);position:relative}
#rec-btn::before{content:'';position:absolute;inset:8px;background:#fff;border-radius:50%;transition:border-radius .2s,inset .2s}
#rec-btn.rec::before{border-radius:4px;inset:16px}
#rec-btn.rec{animation:rp 1.5s ease-in-out infinite}
@keyframes rp{0%,100%{box-shadow:0 0 0 3px rgba(232,25,44,.3)}50%{box-shadow:0 0 0 8px rgba(232,25,44,.12)}}

/* TIMER */
#timer{font-family:var(--mono);font-size:12px;font-weight:500;color:#fff;background:rgba(232,25,44,.85);padding:3px 10px;border-radius:100px;letter-spacing:1px;display:none;align-items:center;gap:5px}
#timer.on{display:flex}
#timer::before{content:'';width:6px;height:6px;background:#fff;border-radius:50%;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}

/* STATUS */
#status{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10;pointer-events:none}
.badge{font-size:11px;font-family:var(--mono);padding:3px 10px;border-radius:100px;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.badge.live{background:rgba(232,25,44,.2);border-color:rgba(232,25,44,.4);color:var(--red)}

/* TOAST */
#toast{position:absolute;top:52px;left:50%;transform:translateX(-50%) translateY(-6px);background:rgba(20,20,20,.95);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 18px;font-size:13px;color:#f0f0f0;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;z-index:30;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SELECT */
.sw{position:relative;display:flex;align-items:center}
.sw svg{position:absolute;right:10px;width:12px;height:12px;pointer-events:none;color:rgba(255,255,255,.4)}
#dev{appearance:none;background:rgba(255,255,255,.1);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:100px;color:#fff;font-family:var(--font);font-size:12px;padding:7px 28px 7px 12px;cursor:pointer;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;outline:none}
#dev option{background:#1a1a1a;color:#fff}
</style>
</head>
<body>
<div id="app">
  <div id="vw">
    <div id="ph">
      <div class="logo">
        <div class="dot"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        SwitchCapture
      </div>
      <p>連接 USB 擷取卡，點擊開始在瀏覽器玩 Switch</p>
      <button id="start-btn" onclick="startCapture()">▶ 開始擷取</button>
    </div>

    <video id="preview" autoplay playsinline muted></video>
    <div id="flash"></div>

    <div id="status">
      <div class="badge" id="res">--</div>
      <div class="badge live" id="live" style="display:none">● LIVE</div>
      <div id="timer">00:00:00</div>
    </div>

    <div id="ctrl" class="hide">
      <div class="cg">
        <div class="sw">
          <select id="dev" onchange="switchDev(this.value)"><option>載入中…</option></select>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="cg">
        <button class="btn ib" onclick="takePhoto()" title="截圖">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="13" r="4"/><path d="M5 7h2l2-2h6l2 2h2a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9a2 2 0 012-2z"/>
          </svg>
        </button>
        <button class="btn" id="rec-btn" onclick="toggleRec()"></button>
        <button class="btn ib" id="mute-btn" onclick="toggleAudio()" title="音訊">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
          </svg>
        </button>
      </div>
      <div class="cg">
        <button class="btn ib" onclick="toggleFS()" title="全螢幕">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="toast"></div>
  </div>
</div>
<canvas id="cv" style="display:none"></canvas>

<script>
let stream=null,mr=null,chunks=[],recording=false,audioOn=false,audioEl=null;
let timerSec=0,timerIv=null,idleIv=null,curDev=null;

const video=document.getElementById('preview');
const flash=document.getElementById('flash');
const ctrl=document.getElementById('ctrl');
const timer=document.getElementById('timer');
const res=document.getElementById('res');
const live=document.getElementById('live');
const toast=document.getElementById('toast');
const ph=document.getElementById('ph');
const cv=document.getElementById('cv');

async function startCapture(){
  try{
    // First get permission with minimal constraints
    stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
    await loadDevices();
    // Now try all devices to find the capture card (non-front/back)
    await attachBestDevice();
    ph.classList.add('hidden');
    ctrl.classList.remove('hide');
    live.style.display='flex';
    setupIdle();
  }catch(e){
    alert('錯誤：'+e.message+'\n\n請確認：\n1. 使用 HTTPS 連線\n2. 已允許相機/麥克風權限');
  }
}

async function attachBestDevice(){
  const devs=await navigator.mediaDevices.enumerateDevices();
  const vids=devs.filter(d=>d.kind==='videoinput');
  // Try each device, pick first one that isn't front/back camera
  for(var i=0;i<vids.length;i++){
    var d=vids[i];
    var label=(d.label||'').toLowerCase();
    // Skip obvious phone cameras
    if(label.includes('facing front')||label.includes('facing back'))continue;
    try{
      var s=await navigator.mediaDevices.getUserMedia({
        video:{deviceId:{exact:d.deviceId}},audio:false
      });
      if(stream)stream.getTracks().forEach(function(t){t.stop();});
      stream=s;
      video.srcObject=stream;
      video.muted=true;
      await video.play();
      curDev=d.deviceId;
      video.onloadedmetadata=updateRes;
      return;
    }catch(e){}
  }
  // Fallback: just use whatever stream we have
  video.srcObject=stream;
  video.muted=true;
  await video.play();
  video.onloadedmetadata=updateRes;
}

function updateRes(){
  var s=stream&&stream.getVideoTracks()[0]&&stream.getVideoTracks()[0].getSettings()||{};
  res.textContent=(s.width||'?')+'x'+(s.height||'?')+' · '+Math.round(s.frameRate||0)+'fps';
}

async function loadDevices(){
  const devs=await navigator.mediaDevices.enumerateDevices();
  const vids=devs.filter(d=>d.kind==='videoinput');
  const sel=document.getElementById('dev');
  sel.innerHTML='';
  const cur=stream&&stream.getVideoTracks()[0]&&stream.getVideoTracks()[0].getSettings().deviceId;
  vids.forEach(function(d,i){
    const o=document.createElement('option');
    o.value=d.deviceId;
    o.textContent=d.label||('Camera '+(i+1));
    if(d.deviceId===cur){o.selected=true;curDev=d.deviceId;}
    sel.appendChild(o);
  });
}

async function switchDev(id){
  if(!stream||id===curDev)return;
  curDev=id;
  stream.getTracks().forEach(function(t){t.stop();});
  if(audioEl){audioEl.pause();audioEl=null;audioOn=false;}
  stream=await navigator.mediaDevices.getUserMedia({
    video:{deviceId:{exact:id}},audio:false
  });
  video.srcObject=stream;
  video.muted=true;
  video.play();
}

function takePhoto(){
  if(!stream)return;
  const w=video.videoWidth,h=video.videoHeight;
  cv.width=w;cv.height=h;
  cv.getContext('2d').drawImage(video,0,0,w,h);
  flash.classList.remove('go');
  void flash.offsetWidth;
  flash.classList.add('go');
  cv.toBlob(function(b){
    const a=document.createElement('a');
    a.href=URL.createObjectURL(b);
    a.download='switch_'+ts()+'.png';
    a.click();
    URL.revokeObjectURL(a.href);
  },'image/png');
  showToast('📸 截圖已儲存');
}

function toggleRec(){recording?stopRec():startRec();}

function getMime(){
  var types=['video/mp4;codecs=h264,aac','video/mp4','video/webm;codecs=h264','video/webm;codecs=vp9,opus','video/webm'];
  for(var i=0;i<types.length;i++){if(MediaRecorder.isTypeSupported(types[i]))return types[i];}
  return 'video/webm';
}

function startRec(){
  if(!stream)return;
  chunks=[];
  var mime=getMime();
  mr=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:8000000});
  mr.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
  mr.onstop=function(){
    var ext=mime.indexOf('mp4')>=0?'mp4':'webm';
    var b=new Blob(chunks,{type:mime});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(b);
    a.download='switch_'+ts()+'.'+ext;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('🎬 影片已儲存');
  };
  mr.start(100);
  recording=true;
  document.getElementById('rec-btn').classList.add('rec');
  timer.classList.add('on');
  timerSec=0;updateTimer();
  timerIv=setInterval(function(){timerSec++;updateTimer();},1000);
}

function stopRec(){
  if(mr)mr.stop();
  recording=false;
  document.getElementById('rec-btn').classList.remove('rec');
  clearInterval(timerIv);
  timer.classList.remove('on');
}

function updateTimer(){
  var h=String(Math.floor(timerSec/3600)).padStart(2,'0');
  var m=String(Math.floor((timerSec%3600)/60)).padStart(2,'0');
  var s=String(timerSec%60).padStart(2,'0');
  timer.textContent=h+':'+m+':'+s;
}

function toggleAudio(){
  audioOn=!audioOn;
  var btn=document.getElementById('mute-btn');
  if(audioOn){
    if(!audioEl&&stream){
      audioEl=new Audio();
      audioEl.srcObject=new MediaStream(stream.getAudioTracks());
      audioEl.muted=false;
      audioEl.play().catch(function(){});
    }
    if(audioEl)audioEl.muted=false;
    btn.style.color='#fff';
    showToast('🔊 音訊已開啟');
  }else{
    if(audioEl)audioEl.muted=true;
    btn.style.color='#e8192c';
    showToast('🔇 音訊已靜音');
  }
}

function toggleFS(){
  var el=document.getElementById('vw');
  if(!document.fullscreenElement){
    var fn=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen;
    if(fn)fn.call(el);
  }else{
    var ef=document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen;
    if(ef)ef.call(document);
  }
}

function setupIdle(){
  var vw=document.getElementById('vw');
  function show(){
    ctrl.classList.remove('hide');
    clearTimeout(idleIv);
    idleIv=setTimeout(function(){ctrl.classList.add('hide');},3500);
  }
  vw.addEventListener('mousemove',show);
  vw.addEventListener('touchstart',show,{passive:true});
  show();
}

function showToast(msg){
  toast.textContent=msg;
  toast.classList.add('show');
  setTimeout(function(){toast.classList.remove('show');},2200);
}

function ts(){return new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);}

if(navigator.mediaDevices&&navigator.mediaDevices.addEventListener){
  navigator.mediaDevices.addEventListener('devicechange',function(){if(stream)loadDevices();});
}
</script>
</body>
</html>
