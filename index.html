<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#08080a">
<title>SwitchLens</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --acc:#00D4FF;--red:#E8192C;--bg:#08080a;
  --border:rgba(255,255,255,.09);--text:#eef0f4;
  --sub:rgba(255,255,255,.38);--sub2:rgba(255,255,255,.18);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --mono:'SF Mono','Fira Code','JetBrains Mono','Consolas',monospace;
  --blur:blur(20px) saturate(180%);--r:12px;--r2:8px;--strip:42px;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;user-select:none;-webkit-user-select:none}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(0,212,255,.04),transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(120,60,220,.04),transparent 60%);pointer-events:none;z-index:0}
#topstrip{position:fixed;top:0;left:0;right:0;height:var(--strip);background:rgba(8,8,12,.95);backdrop-filter:blur(16px) saturate(160%);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 14px;z-index:200;gap:10px}
#strip-logo{font-size:13px;font-weight:700;letter-spacing:-.3px;background:linear-gradient(90deg,#fff 30%,rgba(255,255,255,.45));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0}
#mic-perm{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);padding:4px 11px;border-radius:100px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:var(--sub);cursor:pointer;transition:all .2s;flex-shrink:0}
#mic-perm:hover{background:rgba(255,255,255,.1)}
#mic-perm.granted{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.3);color:var(--acc)}
#mic-perm.denied{background:rgba(232,25,44,.1);border-color:rgba(232,25,44,.3);color:#ff4055}
#mic-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
#strip-hint{flex:1;text-align:center;font-size:11px;font-family:var(--mono);color:rgba(255,255,255,.18);letter-spacing:.3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
#strip-rec{display:none;align-items:center;gap:6px;font-size:12px;font-family:var(--mono);padding:4px 12px;border-radius:100px;background:rgba(232,25,44,.88);color:#fff;letter-spacing:1px;flex-shrink:0}
#strip-rec.on{display:flex}
#strip-rec::before{content:'';width:6px;height:6px;background:#fff;border-radius:50%;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
#lang-sw{display:flex;gap:5px;flex-shrink:0}
.lb{font-size:11px;font-weight:700;letter-spacing:.4px;padding:4px 10px;border-radius:100px;cursor:pointer;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:var(--sub);transition:background .15s,color .15s;font-family:var(--mono)}
.lb:hover{background:rgba(255,255,255,.14);color:var(--text)}
.lb.active{background:rgba(0,212,255,.15);border-color:rgba(0,212,255,.4);color:var(--acc)}
#app{width:100vw;height:calc(100vh - var(--strip));margin-top:var(--strip);display:flex;gap:8px;padding:10px;position:relative;z-index:1}
.panel{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:var(--r);background:rgba(255,255,255,.018);overflow:hidden;position:relative}
#left-panel{flex:3;min-width:0}
#right-panel{flex:2;min-width:0}
.panel-bar{height:34px;background:rgba(255,255,255,.04);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.pdots{display:flex;gap:5px;align-items:center}
.pdot{width:10px;height:10px;border-radius:50%}
.pdot.r{background:#ff5f57}.pdot.y{background:#ffbd2e}.pdot.g{background:#28c840}
.panel-title{font-size:12px;font-weight:600;color:var(--sub);letter-spacing:.2px;flex:1}
.pbadge{font-size:11px;font-family:var(--mono);padding:3px 9px;border-radius:100px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.08);color:var(--sub)}
.pbadge.live{background:rgba(232,25,44,.18);border-color:rgba(232,25,44,.3);color:#ff4055}
.pbadge.acc{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.25);color:var(--acc)}
.panel-body{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column}
#vid-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;background:var(--bg);z-index:10;transition:opacity .4s;overflow-y:auto}
#vid-ph::-webkit-scrollbar{width:3px}
#vid-ph::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
#vid-ph.gone{opacity:0;pointer-events:none}
.ph-logo{display:flex;align-items:center;gap:12px}
.ph-ring{width:42px;height:42px;border-radius:13px;flex-shrink:0;background:linear-gradient(135deg,#00C8FF,#7B44EE 50%,#E8192C);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(0,212,255,.2)}
.ph-ring svg{width:20px;height:20px}
.ph-name{font-size:22px;font-weight:800;letter-spacing:-1px;background:linear-gradient(90deg,#fff 40%,rgba(255,255,255,.5));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#aud-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:12px;padding:16px;background:var(--bg);z-index:10;transition:opacity .4s;overflow-y:auto}
#aud-ph.gone{opacity:0;pointer-events:none}
.card{width:100%;max-width:380px;background:rgba(255,255,255,.028);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.card-hd{padding:9px 14px;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--sub2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
.card-hd::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--acc);opacity:.7;flex-shrink:0}
.dev-scroll{max-height:170px;overflow-y:auto;overflow-x:hidden}
.dev-scroll::-webkit-scrollbar{width:3px}
.dev-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.dev-item{padding:11px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:11px;transition:background .12s}
.dev-item:not(:last-child){border-bottom:1px solid rgba(255,255,255,.04)}
.dev-item:hover{background:rgba(255,255,255,.04)}
.dev-item.active{background:rgba(0,212,255,.07)}
.dev-icon{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dev-icon svg{width:14px;height:14px;fill:none;stroke:var(--sub);stroke-width:1.8}
.dev-item.active .dev-icon{background:rgba(0,212,255,.15)}
.dev-item.active .dev-icon svg{stroke:var(--acc)}
.dev-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
.cap-tag{font-size:10px;font-weight:700;letter-spacing:.4px;padding:2px 7px;border-radius:100px;background:rgba(0,212,255,.12);color:var(--acc);text-transform:uppercase;flex-shrink:0}
.dev-empty{padding:18px 14px;font-size:13px;color:var(--sub);text-align:center;line-height:1.65}
.ph-btns{display:flex;gap:8px;width:100%;max-width:380px}
.pBtn{flex:1;padding:11px 14px;border:none;border-radius:100px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .12s}
.pBtn:active{opacity:.75;transform:scale(.97)}
.pBtn.pri{background:var(--acc);color:#000;box-shadow:0 0 18px rgba(0,212,255,.3)}
.pBtn.sec{background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text)}
#ph-log{font-size:12px;color:var(--sub);font-family:var(--mono);text-align:center}
#aud-ph-hint{font-size:12px;color:var(--sub2);font-family:var(--mono);text-align:center;padding:4px 0}
#glCanvas{position:absolute;inset:0;width:100%;height:100%;display:block;transform-origin:center center;transition:transform .05s linear;cursor:default}
#glCanvas.panning{cursor:grabbing}
video#src{display:none}
#ctrl{position:absolute;bottom:0;left:0;right:0;padding:10px 14px 14px;background:linear-gradient(to top,rgba(0,0,0,.95),rgba(0,0,0,.55) 65%,transparent);display:flex;align-items:center;justify-content:space-between;gap:8px;z-index:20;transition:opacity .4s,transform .4s}
#ctrl.hide{opacity:0;transform:translateY(8px);pointer-events:none}
.ctrl-side{display:flex;align-items:center;gap:7px;flex:1}
.ctrl-side.right{justify-content:flex-end}
.ctrl-center{display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ib{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.09);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:background .15s,transform .1s;flex-shrink:0}
.ib:hover{background:rgba(255,255,255,.17)}
.ib:active{transform:scale(.87)}
.ib svg{width:15px;height:15px}
.ib.muted{background:rgba(232,25,44,.15);border-color:rgba(232,25,44,.28);color:#ff4055}
.ib.on{background:rgba(0,212,255,.15);border-color:rgba(0,212,255,.3);color:var(--acc)}
.ctrl-div{width:1px;height:22px;background:rgba(255,255,255,.1);flex-shrink:0}
.sel-wrap{position:relative;display:flex;align-items:center}
.sel-wrap .chev{position:absolute;right:8px;width:10px;height:10px;pointer-events:none;color:var(--sub)}
select.sel{appearance:none;background:rgba(255,255,255,.09);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:100px;color:var(--text);font-family:var(--font);font-size:11px;padding:7px 24px 7px 11px;cursor:pointer;outline:none;max-width:120px}
select.sel option{background:#111115;color:#fff}
select.sel:focus{border-color:rgba(0,212,255,.35)}
#rec-btn{width:50px;height:50px;border-radius:50%;background:var(--red);box-shadow:0 0 0 3px rgba(232,25,44,.22),0 4px 16px rgba(232,25,44,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;transition:transform .12s}
#rec-btn:active{transform:scale(.9)}
#rec-inner{width:18px;height:18px;background:#fff;border-radius:50%;transition:border-radius .22s,width .22s,height .22s}
#rec-btn.rec #rec-inner{border-radius:4px;width:13px;height:13px}
#rec-btn.rec{animation:rpulse 1.8s ease-in-out infinite}
@keyframes rpulse{0%,100%{box-shadow:0 0 0 3px rgba(232,25,44,.22),0 4px 16px rgba(232,25,44,.3)}50%{box-shadow:0 0 0 10px rgba(232,25,44,.07),0 4px 24px rgba(232,25,44,.4)}}
#topbar{position:absolute;top:10px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:5px;z-index:20;pointer-events:none;transition:opacity .35s}
#topbar.hide{opacity:0}
.badge{font-size:11px;font-family:var(--mono);letter-spacing:.4px;padding:4px 10px;border-radius:100px;background:rgba(0,0,0,.75);backdrop-filter:var(--blur);border:1px solid rgba(255,255,255,.1);color:var(--sub)}
.badge.live{background:rgba(232,25,44,.18);border-color:rgba(232,25,44,.35);color:#ff4055}
.badge.acc{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.25);color:var(--acc)}
#aud-vis{flex:1;display:flex;flex-direction:column;min-height:0}
#audCanvas{flex:1;width:100%;height:0;min-height:0;display:block}
.aud-label{font-size:10px;font-family:var(--mono);color:var(--sub2);letter-spacing:.5px;text-transform:uppercase;text-align:center;padding:8px 0 4px}
#aud-ctrl{padding:10px 14px;border-top:1px solid var(--border);display:none;align-items:center;gap:8px;flex-shrink:0}
#vol-wrap{display:flex;align-items:center;overflow:hidden;max-width:0;opacity:0;transition:max-width .3s,opacity .3s}
#vol-wrap.show{max-width:100px;opacity:1}
#vol-slider{-webkit-appearance:none;appearance:none;width:72px;height:3px;border-radius:100px;outline:none;cursor:pointer;background:linear-gradient(to right,var(--acc) 0%,var(--acc) 80%,rgba(255,255,255,.2) 80%)}
#vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 0 6px rgba(0,212,255,.5)}
#sp{position:absolute;bottom:64px;right:10px;width:260px;background:rgba(12,12,18,.97);backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:var(--r);padding:16px;z-index:30;display:none;flex-direction:column;gap:16px}
#sp.open{display:flex}
.sp-title{font-size:11px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--sub);display:flex;align-items:center;gap:7px}
.sp-title::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--acc);flex-shrink:0}
.sp-row{display:flex;flex-direction:column;gap:8px}
.opts{display:flex;gap:5px;flex-wrap:wrap}
.opt{padding:5px 11px;border-radius:100px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--sub);font-family:var(--font);font-size:12px;cursor:pointer;transition:background .12s,color .12s}
.opt:hover{background:rgba(255,255,255,.12);color:var(--text)}
.opt.sel2{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.35);color:var(--acc)}
#flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:25}
#flash.go{animation:fl .4s ease-out forwards}
@keyframes fl{0%{opacity:.8}100%{opacity:0}}
#zoom-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;font-family:var(--mono);padding:6px 13px;border-radius:100px;background:rgba(0,0,0,.8);backdrop-filter:var(--blur);border:1px solid rgba(255,255,255,.12);color:var(--sub);pointer-events:none;opacity:0;transition:opacity .3s;z-index:22}
#zoom-hint.show{opacity:1}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(4px);background:rgba(14,14,20,.97);backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:var(--r2);padding:8px 18px;font-size:13px;color:var(--text);pointer-events:none;opacity:0;transition:opacity .22s,transform .22s;z-index:300;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="topstrip">
  <div id="strip-logo">SwitchLens</div>
  <div id="mic-perm" onclick="requestMicPerm()">
    <div id="mic-dot"></div>
    <span id="mic-perm-text">麥克風: 等待授權</span>
  </div>
  <div id="strip-hint"></div>
  <div id="strip-rec"><span id="timer-text">00:00:00</span></div>
  <div id="lang-sw">
    <div class="lb active" data-lang="zh" onclick="setLang('zh')">中文</div>
    <div class="lb" data-lang="en" onclick="setLang('en')">EN</div>
    <div class="lb" data-lang="ja" onclick="setLang('ja')">日本語</div>
  </div>
</div>
<div id="app">
  <div id="left-panel" class="panel">
    <div class="panel-bar">
      <div class="pdots"><div class="pdot r"></div><div class="pdot y"></div><div class="pdot g"></div></div>
      <div class="panel-title" id="i-panel-vid">視訊輸入</div>
      <div class="pbadge" id="res-badge">--</div>
      <div class="pbadge acc" id="fps-badge" style="display:none">-- fps</div>
      <div class="pbadge live" id="live-badge" style="display:none">● LIVE</div>
      <div class="pbadge acc" id="zoom-badge" style="display:none">1.0×</div>
    </div>
    <div class="panel-body" id="left-body">
      <div id="vid-ph">
        <div class="ph-logo">
          <div class="ph-ring">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.7">
              <rect x="2" y="7" width="13" height="11" rx="2"/>
              <path d="M15 9l5-2v10l-5-2"/>
              <circle cx="8.5" cy="12.5" r="2" fill="white" stroke="none"/>
            </svg>
          </div>
          <div class="ph-name">SwitchLens</div>
        </div>
        <div class="card">
          <div class="card-hd" id="i-card-video">視訊設備</div>
          <div class="dev-scroll" id="dev-list"></div>
        </div>
        <div class="ph-btns">
          <button class="pBtn sec" id="btn-refresh" onclick="refreshDevices()">重新整理</button>
          <button class="pBtn pri" id="btn-start" onclick="startCapture()">▶ 開始擷取</button>
        </div>
        <div id="ph-log"></div>
      </div>
      <video id="src" autoplay playsinline muted></video>
      <canvas id="glCanvas"></canvas>
      <canvas id="snap" style="display:none"></canvas>
      <div id="flash"></div>
      <div id="zoom-hint"></div>
      <div id="topbar" class="hide"></div>
      <div id="ctrl" class="hide">
        <div class="ctrl-side left">
          <div class="sel-wrap">
            <select class="sel" id="vid-sel" onchange="switchVideo(this.value)"></select>
            <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="ib" onclick="takePhoto()" id="i-tip-snap" title="截圖">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="13" r="4"/><path d="M5 7h2l2-2h6l2 2h2a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9a2 2 0 012-2z"/></svg>
          </div>
          <div class="ib" onclick="toggleFS()" id="i-tip-fs" title="全螢幕">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
          </div>
        </div>
        <div class="ctrl-div"></div>
        <div class="ctrl-center">
          <button id="rec-btn" onclick="toggleRec()"><div id="rec-inner"></div></button>
        </div>
        <div class="ctrl-div"></div>
        <div class="ctrl-side right">
          <div class="ib" id="sett-btn" onclick="toggleSettings(event)" title="設定">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          </div>
        </div>
      </div>
      <div id="sp">
        <div class="sp-row">
          <div class="sp-title" id="i-sett-br">錄影位元率</div>
          <div class="opts" id="br-opts">
            <div class="opt" data-v="4000000">4 Mbps</div>
            <div class="opt sel2" data-v="8000000">8 Mbps</div>
            <div class="opt" data-v="16000000">16 Mbps</div>
            <div class="opt" data-v="30000000">30 Mbps</div>
          </div>
        </div>
        <div class="sp-row">
          <div class="sp-title" id="i-sett-fmt">格式</div>
          <div class="opts" id="fmt-opts">
            <div class="opt sel2" data-v="auto" id="i-fmt-auto">自動</div>
            <div class="opt" data-v="webm">WebM</div>
            <div class="opt" data-v="mp4">MP4</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="right-panel" class="panel">
    <div class="panel-bar">
      <div class="pdots"><div class="pdot r"></div><div class="pdot y"></div><div class="pdot g"></div></div>
      <div class="panel-title" id="i-panel-aud">音訊輸入</div>
    </div>
    <div class="panel-body" id="right-body">
      <div id="aud-ph">
        <div class="card">
          <div class="card-hd" id="i-card-audio">音訊設備</div>
          <div class="dev-scroll" id="aud-list"></div>
        </div>
        <div id="aud-ph-hint">選擇音訊設備後點擊「開始擷取」</div>
      </div>
      <div id="aud-vis">
        <div class="aud-label" id="i-aud-label">音訊電平</div>
        <canvas id="audCanvas"></canvas>
      </div>
      <div id="aud-ctrl">
        <div class="ib" id="aud-btn" onclick="toggleAudioMonitor()" title="音訊監聽">

function buildSelects(){vidSel.innerHTML='';allVid.forEach(function(d,i){var o=document.createElement('option');o.value=d.deviceId;o.textContent=shorten(d.label,i,'v');if(d.deviceId===curVidId)o.selected=true;vidSel.appendChild(o);});audSel.innerHTML='<option value="">'+T.selNoAudio+'</option>';allAud.forEach(function(d,i){var o=document.createElement('option');o.value=d.deviceId;o.textContent=shorten(d.label,i,'a');if(d.deviceId===curAudId)o.selected=true;audSel.appendChild(o);});}
function setLog(msg){$('ph-log').textContent=msg;}
async function startCapture(){if(!allVid.length){await refreshDevices();if(!allVid.length)return;}setLog(T.logConnecting);try{if(vidStream)vidStream.getTracks().forEach(function(t){t.stop();});if(audEl){audEl.srcObject=null;audEl=null;}stopAudioVis();if(!curAudId&&allAud.length>0){var capA=allAud.find(function(d){return isCapture(d.label);});var usbA=allAud.find(function(d){return isUsbAudio(d.label)&&d.deviceId!=='default';});var nonBI=allAud.find(function(d){return !isBuiltinAudio(d.label)&&d.deviceId!=='default';});var first=allAud.find(function(d){return d.deviceId!=='default';})||allAud[0];curAudId=(capA||usbA||nonBI||first).deviceId;}vidStream=await navigator.mediaDevices.getUserMedia({video:{deviceId:curVidId?{exact:curVidId}:undefined,width:{ideal:1920},height:{ideal:1080},frameRate:{ideal:60}},audio:false});audStream=null;if(curAudId){try{audStream=await navigator.mediaDevices.getUserMedia({audio:{deviceId:{ideal:curAudId},echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false});}catch(eA){try{audStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});showToast(T.tFallbackMic);}catch(eA2){showToast(T.tAudFail(eA.message));}}}srcVideo.srcObject=vidStream;srcVideo.muted=true;await srcVideo.play();if(!gl)initGL();if(rafId)cancelAnimationFrame(rafId);fpsLast=performance.now();fpsCount=0;renderLoop();srcVideo.onloadedmetadata=function(){var s=vidStream.getVideoTracks()[0].getSettings();resBadge.textContent=(s.width||'?')+'x'+(s.height||'?')+' · '+(s.frameRate?Math.round(s.frameRate):'--')+'fps';resBadge.classList.add('acc');};vidPh.classList.add('gone');audPh.classList.add('gone');audVis.style.display='flex';audCtrl.style.display='flex';ctrl.classList.remove('hide');topbar.classList.remove('hide');liveBadge.style.display='flex';fpsBadge.style.display='flex';buildSelects();setupIdle();if(audStream&&audStream.getAudioTracks().length>0){audOn=true;startAudPlayback();updateAudUI();initAudioVis(audStream);updateMicPerm('granted');}showToast(T.tConnected(!!audStream));}catch(e){setLog(T.logError(e.message));showToast(T.tConnectFail(e.message));}}
async function switchVideo(id){if(!id)return;curVidId=id;await startCapture();}
async function switchAudio(id){curAudId=id||null;if(audEl){audEl.srcObject=null;audEl=null;}if(!vidStream)return;vidStream.getAudioTracks().forEach(function(t){t.stop();vidStream.removeTrack(t);});if(!id){audStream=null;audOn=false;updateAudUI();stopAudioVis();showToast(T.tAudDisabled);return;}try{var newAud=await navigator.mediaDevices.getUserMedia({audio:{deviceId:{exact:id},echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false});newAud.getAudioTracks().forEach(function(t){vidStream.addTrack(t);});audStream=new MediaStream(vidStream.getAudioTracks());if(audOn)startAudPlayback();initAudioVis(audStream);showToast(T.tAudSwitched);}catch(e){showToast(T.tAudSwitchFail(e.message));audStream=null;}}
function startAudPlayback(){if(audEl){audEl.srcObject=null;audEl=null;}var tracks=audStream?audStream.getAudioTracks():[];if(!tracks.length){showToast(T.tNoAudTrack);return;}audEl=new Audio();audEl.srcObject=new MediaStream(tracks);audEl.muted=false;audEl.volume=volLevel;audEl.play().catch(function(e){showToast(T.tAudPlayFail(e.message));});}
function toggleAudioMonitor(){var hasAudio=audStream&&audStream.getAudioTracks().length>0;if(!hasAudio&&!audOn){showToast(T.tNoAudSrc);return;}audOn=!audOn;if(audOn){startAudPlayback();showToast(T.tAudOn);initAudioVis(audStream);}else{if(audEl){audEl.muted=true;audEl.srcObject=null;audEl=null;}showToast(T.tAudOff);stopAudioVis();}updateAudUI();}
function setVolume(val){volLevel=val/100;if(audEl)audEl.volume=volLevel;volSlider.style.background='linear-gradient(to right,var(--acc) 0%,var(--acc) '+val+'%,rgba(255,255,255,.2) '+val+'%)';}
function updateAudUI(){$('aud-btn').classList.toggle('muted',!audOn);$('vol-waves').style.display=audOn?'':'none';volWrap.classList.toggle('show',audOn);}
function takePhoto(){if(!vidStream)return;var w=srcVideo.videoWidth,h=srcVideo.videoHeight;if(!w||!h)return;snapCanvas.width=w;snapCanvas.height=h;snapCanvas.getContext('2d').drawImage(srcVideo,0,0,w,h);flash.classList.remove('go');void flash.offsetWidth;flash.classList.add('go');snapCanvas.toBlob(function(b){if(!b){showToast(T.tSnapFail);return;}var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='SwitchLens_'+ts()+'.png';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);},'image/png');showToast(T.tSnapOk);}
function getMime(){var lists={mp4:['video/mp4;codecs=h264,aac','video/mp4;codecs=avc1','video/mp4'],webm:['video/webm;codecs=h264,opus','video/webm;codecs=vp9,opus','video/webm'],auto:['video/webm;codecs=h264,opus','video/mp4;codecs=h264,aac','video/webm;codecs=vp9,opus','video/webm']};var c=lists[fmtPref]||lists.auto;for(var i=0;i<c.length;i++)if(MediaRecorder.isTypeSupported(c[i]))return c[i];return '';}
function toggleRec(){isRec?stopRec():startRec();}
function startRec(){if(!vidStream)return;recChunks=[];var tracks=vidStream.getVideoTracks().slice();if(audStream)tracks=tracks.concat(audStream.getAudioTracks());var mime=getMime();try{mediaRec=new MediaRecorder(new MediaStream(tracks),{mimeType:mime,videoBitsPerSecond:bitrate});}catch(e){mediaRec=new MediaRecorder(new MediaStream(tracks));}mediaRec.ondataavailable=function(e){if(e.data&&e.data.size>0)recChunks.push(e.data);};mediaRec.onstop=function(){var ext=getMime().includes('mp4')?'mp4':'webm';var blob=new Blob(recChunks,{type:getMime()||'video/webm'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='SwitchLens_'+ts()+'.'+ext;a.click();URL.revokeObjectURL(a.href);showToast(T.tRecSaved);};mediaRec.start(100);isRec=true;$('rec-btn').classList.add('rec');stripRec.classList.add('on');timerSec=0;updateTimer();timerIv=setInterval(function(){timerSec++;updateTimer();},1000);showToast(audStream?T.tRecStart:T.tRecStartNoAud);}
function stopRec(){if(mediaRec)mediaRec.stop();isRec=false;$('rec-btn').classList.remove('rec');stripRec.classList.remove('on');clearInterval(timerIv);}
function updateTimer(){var h=Math.floor(timerSec/3600),m=Math.floor((timerSec%3600)/60),s=timerSec%60;timerText.textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}
function toggleSettings(e){if(e)e.stopPropagation();sp.classList.toggle('open');$('sett-btn').classList.toggle('on',sp.classList.contains('open'));}
document.querySelectorAll('#br-opts .opt').forEach(function(btn){btn.onclick=function(){bitrate=parseInt(btn.dataset.v);document.querySelectorAll('#br-opts .opt').forEach(function(b){b.classList.remove('sel2');});btn.classList.add('sel2');};});
document.querySelectorAll('#fmt-opts .opt').forEach(function(btn){btn.onclick=function(){fmtPref=btn.dataset.v;document.querySelectorAll('#fmt-opts .opt').forEach(function(b){b.classList.remove('sel2');});btn.classList.add('sel2');};});
document.addEventListener('click',function(e){if(!sp.contains(e.target)&&e.target!==$('sett-btn')&&!$('sett-btn').contains(e.target)){sp.classList.remove('open');$('sett-btn').classList.remove('on');}});
sp.addEventListener('click',function(e){e.stopPropagation();});
function toggleFS(){var el=$('left-panel');if(!document.fullscreenElement)(el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen).call(el);else(document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen).call(document);}
function setupIdle(){function show(){ctrl.classList.remove('hide');topbar.classList.remove('hide');clearTimeout(idleTimer);idleTimer=setTimeout(function(){ctrl.classList.add('hide');},3500);}leftBody.addEventListener('mousemove',show);leftBody.addEventListener('click',show);show();}
document.addEventListener('keydown',function(e){if(e.target.tagName==='SELECT'||e.target.tagName==='INPUT')return;switch(e.code){case 'Space':e.preventDefault();if(vidStream)toggleRec();break;case 'KeyS':if(vidStream)takePhoto();break;case 'KeyM':if(vidStream)toggleAudioMonitor();break;case 'KeyF':toggleFS();break;case 'Escape':if(zoomScale>1.05){zoomScale=1;panX=0;panY=0;applyTransform();updateZoomBadge();showToast(T.tZoomReset);}break;}});
var toastTmr=null;
function showToast(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(toastTmr);toastTmr=setTimeout(function(){toast.classList.remove('show');},2800);}
function ts(){return new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);}
setLang('zh');
refreshDevices();
if(navigator.mediaDevices&&navigator.mediaDevices.addEventListener){navigator.mediaDevices.addEventListener('devicechange',refreshDevices);}
</script>
